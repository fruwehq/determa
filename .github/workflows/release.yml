name: release

# Tag-triggered release for the determa launcher.
#
# PyPI publish uses Trusted Publishing (OIDC) — no stored token. Configure a PyPI
# Trusted Publisher for project `determa` (repo fruwehq/determa, workflow
# release.yml, environment `pypi`) before the first tag-driven release.
#
# The npm (node/) publish job will be added here once its credential is configured.
# All jobs share the same `v*` tag; workflow_dispatch runs only the crates job (used
# for a first crates.io publish without re-tagging).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/

  pypi:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  crates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC for crates.io Trusted Publishing
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # npm Trusted Publishing (OIDC) — no stored token. Requires the `determa` npm
  # package to already exist with a configured trusted publisher (repo fruwehq/determa,
  # workflow release.yml). The very first 0.1.0 is published manually to create the
  # package; every release after that runs here token-lessly (with provenance).
  npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    permissions:
      id-token: write   # OIDC for npm Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Publish to npm
        run: npm publish --access public
