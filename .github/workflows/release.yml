name: release

# Tag-triggered release for the determa launcher.
#
# PyPI publish uses Trusted Publishing (OIDC) — no stored token. Configure a PyPI
# Trusted Publisher for project `determa` (repo fruwehq/determa, workflow
# release.yml, environment `pypi`) before the first tag-driven release.
#
# The npm (node/) publish job will be added here once its credential is configured.
# All jobs share the same `v*` tag; workflow_dispatch runs only the crates job (used
# for a first crates.io publish without re-tagging). Requires CARGO_REGISTRY_TOKEN.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/

  pypi:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  crates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish

  npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
